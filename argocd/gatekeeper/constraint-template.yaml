apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiredlabels
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredLabels
      validation:
        openAPIV3Schema:
          type: object
          properties:
            labels:
              type: array
              items:
                type: string
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8srequiredlabels
      violation[{"msg": msg, "details": details}] {
        provided := input.review.object.metadata.labels
        required := {label | some i; label := input.parameters.labels[i]}
        missing := required - provided
        count(missing) > 0
        msg := sprintf("missing labels: %v", [missing])
        details := {"missing": missing}
      }
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiredresources
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredResources
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8srequiredresources
      violation[{"msg": msg}] {
        container := input.review.object.spec.containers[_]
        not container.resources.limits
        msg := sprintf("container %v must specify resource limits", [container.name])
      }
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblocklatesttag
spec:
  crd:
    spec:
      names:
        kind: K8sBlockLatestTag
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8sblocklatesttag
      violation[{"msg": msg}] {
        container := input.review.object.spec.containers[_]
        endswith(container.image, ":latest")
        msg := sprintf("container %v uses :latest tag", [container.name])
      }
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblockrootuser
spec:
  crd:
    spec:
      names:
        kind: K8sBlockRootUser
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8sblockrootuser
      violation[{"msg": msg}] {
        input.review.object.spec.securityContext.runAsUser == 0
        msg := "running as root (runAsUser: 0) is forbidden"
      }
      violation[{"msg": msg}] {
        container := input.review.object.spec.containers[_]
        container.securityContext.runAsUser == 0
        msg := sprintf("container %v runs as root", [container.name])
      }
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblockhostnetwork
spec:
  crd:
    spec:
      names:
        kind: K8sBlockHostNetwork
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8sblockhostnetwork
      violation[{"msg": msg}] {
        input.review.object.spec.hostNetwork
        msg := "hostNetwork: true is forbidden"
      }
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sallowedregistries
spec:
  crd:
    spec:
      names:
        kind: K8sAllowedRegistries
      validation:
        openAPIV3Schema:
          type: object
          properties:
            registries:
              type: array
              items:
                type: string
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8sallowedregistries
      violation[{"msg": msg}] {
        container := input.review.object.spec.containers[_]
        image := container.image
        not image_from_allowed_registry(image)
        msg := sprintf("container %v uses untrusted registry: %v", [container.name, image])
      }
      image_from_allowed_registry(image) {
        registry := input.parameters.registries[_]
        startswith(image, registry)
      }
