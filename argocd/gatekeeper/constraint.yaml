---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sAllowedRegistries
metadata:
  name: demo-trusted-registries
spec:
  enforcementAction: deny
  match:
    kinds:
    - apiGroups: [""]
      kinds: ["Pod"]
    namespaceSelector:
      matchLabels:
        gatekeeper: enforced
  parameters:
    registries:
    - "ghcr.io/zacknguyn/"
    - "quay.io/"
    - "docker.io/"
    - "registry.k8s.io/"
