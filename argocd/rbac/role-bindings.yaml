- kind: User
  name: sre
roleRef:
  kind: ClusterRole
  name: sre
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: viewer-binding
  namespace: demo
subjects:
- kind: User
  name: viewer
roleRef:
  kind: ClusterRole
  name: viewer
  apiGroup: rbac.authorization.k8s.io
